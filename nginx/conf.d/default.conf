
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  text/xml
  application/json
  application/javascript
  application/xml
  application/xml+rss
  image/svg+xml
  font/woff
  font/woff2;

server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html index.htm;

  # Hashed static assets (JS/CSS/fonts/images) can be cached forever
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html must always be revalidated so deploys are picked up
  location / {
    # add_header Access-Control-Allow-Origin *;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
